# Example selection config: pin one saved model per role for eval / downstream use.
store:
  root: models
roles:
  demo:
    target: demo
    method: XGB
    feature_hash:        # blank -> latest trained model (models/demo/_latest.json); or pin a hash
    train_start: 2024-01-01   # only used when feature_hash is set
    train_end:   2024-03-01
